<!DOCTYPE html>
<html>
<head>
<title>Shree Laxmi Laboratory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.sidebar{position:fixed;width:230px;height:100%;background:#1f2d3d;color:white;padding-top:20px;}
.sidebar h2{text-align:center;margin-bottom:30px;}
.sidebar a{display:block;color:white;padding:12px 20px;text-decoration:none;}
.sidebar a:hover{background:#32475b;}
.main{margin-left:230px;padding:20px;}
.topbar{background:white;padding:15px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.badge{background:linear-gradient(45deg,#4e73df,#1cc88a);color:white;padding:8px 15px;border-radius:20px;font-weight:bold;}
.tabs{display:flex;gap:15px;margin-bottom:15px;}
.tab{padding:10px 15px;background:#e2e6ea;border-radius:6px;cursor:pointer;}
.tab.active{background:#4e73df;color:white;}
.filters{margin-bottom:15px;}
.filters button{padding:6px 12px;border:none;border-radius:5px;margin-right:5px;cursor:pointer;}
table{width:100%;background:white;border-radius:8px;overflow:hidden;border-collapse:collapse;}
th{background:#2e59d9;color:white;padding:10px;}
td{padding:8px;text-align:center;border-bottom:1px solid #ddd;}
thead{position:sticky;top:0;background:#2f5bd3;color:white;}
.table-container{max-height:500px;overflow-y:auto;}
button{padding:6px 10px;border:none;border-radius:4px;cursor:pointer;font-size:12px;}
.modal{display:none;position:fixed;z-index:9999;inset:0;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;width:350px;max-width:90%;border-radius:10px;}
</style>
</head>

<body>

<div class="sidebar">
<h2>Shree Laxmi</h2>
<a href="#">Dashboard</a>
<a href="#">Bookings</a>
</div>

<div class="main">

<div class="topbar">
<div class="badge">YOUR BADGE IS BRONZE</div>
<button onclick="openModal()">+ New Booking</button>
</div>

<div class="tabs">
<div class="tab active">My Bookings</div>
<div class="tab" onclick="showOnlineLeads()">Online Leads</div>
</div>

<div class="filters">
<button onclick="filterStatus('all')">All</button>
<button onclick="filterStatus('Collected')">Collected</button>
<button onclick="filterStatus('Processed')">Processed</button>
<button onclick="filterStatus('Printed')">Printed</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Mobile</th>
<th>Time</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="bookingTable"></tbody>
</table>
</div>

</div>

<script>

let allBookings = [];
const API_URL = "https://script.google.com/macros/s/AKfycbwOj6IBtK6Mb_Z6E8apfSk13JfTawQOyDua3o7K8xzn2ixDmxf4h53OYWoFPtavSwR6/exec";

function loadFromSheet(){
fetch(API_URL)
.then(res=>res.json())
.then(data=>{
allBookings=data;
loadTable(allBookings);
})
.catch(err=>{
console.log(err);
alert("Error loading data");
});
}

loadFromSheet();

function loadTable(data){
const table=document.getElementById("bookingTable");
table.innerHTML="";

data.forEach(b=>{
table.innerHTML+=`
<tr>
<td>${b.id}</td>
<td>${b.name}</td>
<td>${b.mobile}</td>
<td>${b.time}</td>

<td>
<select onchange="updateStatus('${b.id}', this.value)">
<option value="Pending" ${b.status==="Pending"?"selected":""}>Pending</option>
<option value="Collected" ${b.status==="Collected"?"selected":""}>Collected</option>
<option value="Processed" ${b.status==="Processed"?"selected":""}>Processed</option>
<option value="Printed" ${b.status==="Printed"?"selected":""}>Printed</option>
</select>
</td>

<td>
<button onclick="updateStatus('${b.id}','Processed')">Processed</button>
<button onclick="updateStatus('${b.id}','Printed')">Printed</button>
</td>

</tr>
`;
});
}

function filterStatus(status){
if(status==="all"){
loadTable(allBookings);
}else{
loadTable(allBookings.filter(b=>b.status===status));
}
}

function showOnlineLeads(){
const leads=allBookings.filter(b=>b.source && b.source.toLowerCase()==="online");
loadTable(leads);
}

function updateStatus(id,status){

fetch(API_URL,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
action:"updateStatus",
id:id,
status:status
})
})
.then(res=>res.json())
.then(data=>{
if(data.success){
alert("Status Updated Successfully");
loadFromSheet();
}else{
alert("Update Failed");
}
})
.catch(err=>{
console.log(err);
alert("Error updating status");
});
}

</script>

</body>
</html>
